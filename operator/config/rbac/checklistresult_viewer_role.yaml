# This rule is not used by the project drop-the-mic itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to dtm.dtm.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: drop-the-mic
    app.kubernetes.io/managed-by: kustomize
  name: checklistresult-viewer-role
rules:
- apiGroups:
  - dtm.dtm.io
  resources:
  - checklistresults
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - dtm.dtm.io
  resources:
  - checklistresults/status
  verbs:
  - get
