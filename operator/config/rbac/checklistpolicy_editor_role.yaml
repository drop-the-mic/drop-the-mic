# This rule is not used by the project drop-the-mic itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the dtm.dtm.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: drop-the-mic
    app.kubernetes.io/managed-by: kustomize
  name: checklistpolicy-editor-role
rules:
- apiGroups:
  - dtm.dtm.io
  resources:
  - checklistpolicies
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - dtm.dtm.io
  resources:
  - checklistpolicies/status
  verbs:
  - get
