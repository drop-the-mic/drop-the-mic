{{- if and .Values.ui.enabled .Values.ui.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "dtm.fullname" . }}-ui
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "dtm.uiLabels" . | nindent 4 }}
  {{- with .Values.ui.gateway.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    - name: {{ required "ui.gateway.gatewayRef.name is required when gateway is enabled" .Values.ui.gateway.gatewayRef.name }}
      {{- if .Values.ui.gateway.gatewayRef.namespace }}
      namespace: {{ .Values.ui.gateway.gatewayRef.namespace }}
      {{- end }}
      {{- if .Values.ui.gateway.gatewayRef.sectionName }}
      sectionName: {{ .Values.ui.gateway.gatewayRef.sectionName }}
      {{- end }}
  {{- if .Values.ui.gateway.hostname }}
  hostnames:
    - {{ .Values.ui.gateway.hostname | quote }}
  {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "dtm.fullname" . }}-ui
          port: {{ .Values.ui.service.port }}
{{- end }}
