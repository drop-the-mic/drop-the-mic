{{- if and .Values.ui.enabled .Values.ui.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.ui.serviceAccount.name }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "dtm.uiLabels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "dtm.fullname" . }}-ui
  labels:
    {{- include "dtm.uiLabels" . | nindent 4 }}
rules:
  - apiGroups: ["dtm.dtm.io"]
    resources: ["checklistpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["dtm.dtm.io"]
    resources: ["checklistresults"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["list"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets"]
    verbs: ["list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "dtm.fullname" . }}-ui
  labels:
    {{- include "dtm.uiLabels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "dtm.fullname" . }}-ui
subjects:
  - kind: ServiceAccount
    name: {{ .Values.ui.serviceAccount.name }}
    namespace: {{ .Values.namespace }}
{{- end }}
