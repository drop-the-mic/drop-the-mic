{{- if .Values.operator.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.operator.serviceAccount.name }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "dtm.operatorLabels" . | nindent 4 }}
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "dtm.fullname" . }}-operator
  labels:
    {{- include "dtm.operatorLabels" . | nindent 4 }}
rules:
  # CRD access
  - apiGroups: ["dtm.dtm.io"]
    resources: ["checklistpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["dtm.dtm.io"]
    resources: ["checklistpolicies/status", "checklistpolicies/finalizers"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["dtm.dtm.io"]
    resources: ["checklistresults"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Read-only cluster access for tools
  - apiGroups: [""]
    resources: ["pods", "pods/log", "nodes", "events", "services", "configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch"]
  # Leader election
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "dtm.fullname" . }}-operator
  labels:
    {{- include "dtm.operatorLabels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "dtm.fullname" . }}-operator
subjects:
  - kind: ServiceAccount
    name: {{ .Values.operator.serviceAccount.name }}
    namespace: {{ .Values.namespace }}
