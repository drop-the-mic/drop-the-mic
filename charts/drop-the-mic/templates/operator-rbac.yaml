{{- if .Values.operator.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.operator.serviceAccount.name }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "dtm.operatorLabels" . | nindent 4 }}
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "dtm.fullname" . }}-operator
  labels:
    {{- include "dtm.operatorLabels" . | nindent 4 }}
rules:
  # CRD access
  - apiGroups: ["dtm.dtm.io"]
    resources: ["checklistpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["dtm.dtm.io"]
    resources: ["checklistpolicies/status", "checklistpolicies/finalizers"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["dtm.dtm.io"]
    resources: ["checklistresults"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Read-only cluster access for tools (secrets scoped separately below)
  - apiGroups: [""]
    resources: ["pods", "pods/log", "nodes", "events", "services", "configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch"]
  # Leader election
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "dtm.fullname" . }}-operator
  labels:
    {{- include "dtm.operatorLabels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "dtm.fullname" . }}-operator
subjects:
  - kind: ServiceAccount
    name: {{ .Values.operator.serviceAccount.name }}
    namespace: {{ .Values.namespace }}
{{- /*
  Secret access: scoped to specific namespaces only.
  Default: release namespace. Additional via operator.secretAccess.namespaces.
*/}}
{{- $secretNamespaces := list .Values.namespace }}
{{- range .Values.operator.secretAccess.namespaces }}
{{- if ne . $.Values.namespace }}
{{- $secretNamespaces = append $secretNamespaces . }}
{{- end }}
{{- end }}
{{- range $secretNamespaces }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "dtm.fullname" $ }}-secret-reader
  namespace: {{ . }}
  labels:
    {{- include "dtm.operatorLabels" $ | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "dtm.fullname" $ }}-secret-reader
  namespace: {{ . }}
  labels:
    {{- include "dtm.operatorLabels" $ | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "dtm.fullname" $ }}-secret-reader
subjects:
  - kind: ServiceAccount
    name: {{ $.Values.operator.serviceAccount.name }}
    namespace: {{ $.Values.namespace }}
{{- end }}
