{{- if .Values.ui.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dtm.fullname" . }}-ui
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "dtm.uiLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.ui.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: dtm-ui
  template:
    metadata:
      labels:
        {{- include "dtm.uiLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ .Values.ui.serviceAccount.name }}
      containers:
        - name: server
          image: "{{ .Values.ui.image.repository }}:{{ .Values.ui.image.tag }}"
          imagePullPolicy: {{ .Values.ui.image.pullPolicy }}
          args:
            - --addr=:{{ .Values.ui.service.port }}
          ports:
            - name: http
              containerPort: {{ .Values.ui.service.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.ui.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "dtm.fullname" . }}-ui
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "dtm.uiLabels" . | nindent 4 }}
spec:
  type: {{ .Values.ui.service.type }}
  ports:
    - port: {{ .Values.ui.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: dtm-ui
{{- end }}
